<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark background with rounded corners -->
  <rect width="64" height="64" rx="14" fill="#090B10"/>
  <!-- Subtle purple border -->
  <rect width="64" height="64" rx="14" fill="none" stroke="#8B5CF6" stroke-width="2" stroke-opacity="0.5"/>
  <!-- Purple glow layer -->
  <rect x="6" y="6" width="52" height="52" rx="10" fill="#8B5CF6" fill-opacity="0.08"/>

  <!-- Diamond / vault gem shape -->
  <polygon points="32,12 48,26 32,40 16,26" fill="none" stroke="#8B5CF6" stroke-width="2" stroke-linejoin="round"/>
  <polygon points="32,16 44,26 32,36 20,26" fill="#8B5CF6" fill-opacity="0.25"/>

  <!-- V mark inside diamond -->
  <polyline points="25,22 32,32 39,22" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- "MARK" wordmark below -->
  <text x="32" y="56" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="900" text-anchor="middle" fill="#8B5CF6" letter-spacing="2">MARK</text>
</svg>
